    <style>
      /* ده هيجبر أي حاجة خارجة بره الشاشة إنها تختفي أو تتلم */
body, html {
    overflow-x: hidden !important; 
    width: 100% !important;
    position: relative;
}

/* ده هيخلي كل العناصر "تتحبس" جوه عرض الشاشة */
* {
    max-width: 100vw !important;
    box-sizing: border-box !important;
}

/* لو الكلمة واخدة margin-left كبير، ده هيصفرها في الموبايل */
@media (max-width: 600px) {
    .container, div, section, h1, p {
        margin-left: 0 !important;
        margin-right: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        text-align: center !important; /* هيوسطن لك الكلام عشان يظبط */
    }
}

        <mark class="highlight"><i>Why CSS was created</i></mark>
    </h4>

    <div class="content">
        <p><strong>_</strong> Design & Control: It gives you total power over how your site looks—colors, fonts, spacing, and layouts. Without it, every website would look like a boring 1990s research paper.</p>

        <p><strong>_</strong> Efficiency: You can style 1,000 pages at once by linking them to a single CSS file.</p>

        <p><strong>_</strong> Responsiveness: It allows your website to adapt for different screen sizes like mobile and desktop.</p>

        <p><strong>_</strong> User Experience (UX): CSS improves interaction like hover effects, animations, and layout clarity.</p>
